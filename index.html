<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santuário SOS Animal</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f7f4;
}

header{
    background:#2e7d32;
    color:white;
    padding:25px;
    text-align:center;
}

header h1{
    margin:0;
}

.pesquisa{
    width:90%;
    max-width:500px;
    margin:30px auto;
}

input{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:none;
    font-size:18px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.categorias{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.05);
}

.card h2{
    margin:10px 0;
    color:#2e7d32;
}

.card p{
    color:#666;
}
</style>

</head>
<body>

<header>

<h1>🐾 Santuário SOS Animal</h1>

<p>Base de dados dos animais</p>

</header>

<div class="pesquisa">

<input type="text" placeholder="🔍 Procurar animal...">

</div>

<div class="categorias">

<div class="card">
<h2>🐴 Equinos</h2>
<p>Ver animais</p>
</div>

<div class="card">
<h2>🐄 Bovinos</h2>
<p>Ver animais</p>
</div>

<div class="card">
<h2>🐐 Caprinos</h2>
<p>Ver animais</p>
</div>

<div class="card">
<h2>🐑 Ovinos</h2>
<p>Ver animais</p>
</div>

<div class="card">
<h2>🐖 Suínos</h2>
<p>Ver animais</p>
</div>

<div class="card">
<h2>🐕 Cães</h2>
<p>Ver animais</p>
</div>

<div class="card">
<h2>🐈 Gatos</h2>
<p>Ver animais</p>
</div>

<div class="card">
<h2>🦆 Aves</h2>
<p>Ver animais</p>
</div>

</div>

</body>
</html>
